version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: erp_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: always
    networks:
      - erp_network

  backend:
    build: ./backend
    container_name: erp_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - erp_network

  postgres:
    image: postgres:15
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: erpuser
      POSTGRES_PASSWORD: erppassword
      POSTGRES_DB: erp_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpuser"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - erp_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  erp_network:
    driver: bridge